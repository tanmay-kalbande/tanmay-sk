name: 🌌 Quantum Archives Synthesizer

on:
  # ── Automatic Orbital Cycles: runs every 1 hour ─────────────────────────────
  schedule:
    - cron: '0 * * * *'

  # ── Manual Transmission: Trigger from GitHub Console ───────────────────────
  workflow_dispatch:
    inputs:
      edition:
        description: '🔮 Select Codex Dimension (Edition Persona)'
        required: false
        type: choice
        options:
          - stellar
          - street
          - desi
        default: 'stellar'
      street_lang:
        description: '🗣️ Street Edition Language (only applies when edition = street)'
        required: false
        type: choice
        options:
          - english
          - hinglish
        default: 'english'
      provider:
        description: '🧠 Select Neural Engine Core (AI Provider)'
        required: false
        type: choice
        options:
          - zai
          - mistral
          - cerebras
        default: 'zai'
      model:
        description: '🚀 Select AI Model Engine Override'
        required: false
        type: choice
        options:
          - glm-5.2
          - glm-5.1
          - glm-5
          - GLM-4.7-FlashX
          - mistral-large-latest
          - mistral-medium-latest
          - mistral-small-latest
          - mistral-small-2506
          - gemma-4-31b
          - gpt-oss-120b
          - zai-glm-4.7
        default: 'glm-5.2'
      concurrency:
        description: '⚡ Processing Channels (Default: 1 for maximum stability)'
        required: false
        default: '1'
      max_books:
        description: '📖 Codices to Synthesize (0 = All Unmapped Dimensions)'
        required: false
        default: '0'

# ── Orbital Lock: Ensures zero matrix collision during synthesis ───────────
concurrency:
  group: quantum-library-synthesis
  cancel-in-progress: false

# ── Repository Write Access for Transmission Checkpoint ───────────────────────
permissions:
  contents: write

jobs:
  synthesize:
    name: 🛸 Synthesize Cyber-Codices
    runs-on: ubuntu-latest
    timeout-minutes: 340      # 5h 40min transmission window

    steps:
      # ── 1. Orbital Intercept (Main Repo) ────────────────────────────────────
      - name: 🛰️ Accessing Primary Vault
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Access Data Vault (pustakam-books) — handles empty repos too ────
      - name: 📚 Accessing Data Vault (pustakam-books)
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${DATA_REPO_TOKEN}@github.com/tanmay-kalbande/pustakam-books.git"
          if git clone "$REPO_URL" pustakam-books-data 2>/dev/null; then
            echo "✅ Cloned pustakam-books successfully"
          else
            echo "⚠️ Clone failed (likely empty repo) — initializing fresh local repo"
            mkdir -p pustakam-books-data
            cd pustakam-books-data
            git init
            git remote add origin "$REPO_URL"
            git checkout -b main
            echo "# Pustakam Books Data" > README.md
            git add README.md
            git config user.name "Pustakam Quantum Bot"
            git config user.email "quantum-bot@pustakam.app"
            git commit -m "🌌 Initialize pustakam-books data vault"
            git push -u origin main
            echo "✅ Initialized and pushed first commit to pustakam-books"
          fi

      # ── 3. Initialize Core Matrix Runtime ──────────────────────────────────
      - name: 🔮 Calibrating Node Engine Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Warp Dependencies ────────────────────────────────────────────────
      - name: ⚡ Mounting Sub-system Modules
        run: |
          npm install --no-save tsx @types/node
          echo "✨ Quantum Runtime Active"

      # ── 5. Prepare Data Vault Directories ───────────────────────────────────
      - name: 📁 Preparing Data Vault Directories
        run: |
          mkdir -p pustakam-books-data/books
          echo "📁 Data vault directories ready"

      # ── 6. One-time Migration: Move existing books to pustakam-books ────────
      - name: 🚚 Migrating Existing Codices to Data Vault (First Run Only)
        run: |
          MAIN_COUNT=$(find public/library/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          DATA_COUNT=$(find pustakam-books-data/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          echo "📊 Main vault books: $MAIN_COUNT | Data vault books: $DATA_COUNT"
          if [ "$MAIN_COUNT" -gt "0" ]; then
            echo "🚚 Migrating $MAIN_COUNT codices to pustakam-books..."
            cp public/library/books/*.json pustakam-books-data/books/ 2>/dev/null || true
            if [ -f "public/library/catalog.json" ]; then
              cp public/library/catalog.json pustakam-books-data/catalog.json
              echo "📑 Catalog migrated"
            fi
            echo "✅ Migration complete — $MAIN_COUNT codices transferred"
          else
            echo "ℹ️ No existing codices to migrate (Data vault already populated)"
          fi

      # ── 7. Telemetry Briefing ────────────────────────────────────────────────
      - name: 📊 Telemetry Pre-Synthesis Telepathy
        run: |
          echo "🪐 ──────────────────────────────────────────"
          echo "🌌 Pustakam Universal Generator (V5 Core)"
          echo "🕐 Telemetry Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "📖 Codex Dimension: ${{ github.event.inputs.edition || 'stellar' }}"
          echo "🤖 Neural Core Engine: ${{ github.event.inputs.provider || 'zai' }} (${{ github.event.inputs.model || 'glm-5.2' }})"
          echo "⚡ Active Channels: ${{ github.event.inputs.concurrency || '1' }}"
          echo "📁 Target Vault Path: pustakam-books-data/"
          EXISTING=$(find pustakam-books-data/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          echo "📖 Existing Codices in Data Vault: $EXISTING"
          echo "🪐 ──────────────────────────────────────────"

      # ── 8. Initiate Cosmic Book Synthesis ───────────────────────────────────
      - name: 🚀 Executing Neural Synthesis Pipeline
        env:
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          ZAI_API_KEY:       ${{ secrets.ZAI_API_KEY }}
          CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
          ZAI_MODEL:         'glm-5.2'
          MODEL:             ${{ github.event.inputs.model || 'glm-5.2' }}
          SITE_URL:          'https://tanmaysk.in'
          PROVIDER:          ${{ github.event.inputs.provider || 'zai' }}
          CONCURRENCY:       ${{ github.event.inputs.concurrency || '1' }}
          MAX_BOOKS:         ${{ github.event.inputs.max_books || '0' }}
          STREET_LANG:       ${{ github.event.inputs.street_lang || 'english' }}
          OUTPUT_DIR:        'pustakam-books-data'
          CI:                'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running manual dispatch for edition: ${{ github.event.inputs.edition }}"
            EDITION="${{ github.event.inputs.edition || 'stellar' }}" npx tsx scripts/generate-library.ts
          else
            echo "Running scheduled run: generating 5 stellar editions"
            MAX_BOOKS="5" EDITION="stellar" npx tsx scripts/generate-library.ts
          fi

      # ── 9. Sync Sitemap back to Main Repo ───────────────────────────────────
      - name: 🗺️ Syncing Sitemap to Primary Vault
        run: |
          mkdir -p public/library
          if [ -f "pustakam-books-data/sitemap.xml" ]; then
            cp pustakam-books-data/sitemap.xml public/library/sitemap.xml
            echo "✅ Sitemap synced — tanmaysk.in/library/sitemap.xml stays alive"
          else
            echo "⚠️ No sitemap found in data vault"
          fi

      # ── 10. Post-Synthesis Audit ─────────────────────────────────────────────
      - name: 📈 Post-Synthesis Transmission Audit
        run: |
          TOTAL=$(find pustakam-books-data/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          SITEMAP_URLS=$(grep -c '<url>' public/library/sitemap.xml 2>/dev/null || echo "0")
          CATALOG_SIZE=$(wc -c < pustakam-books-data/catalog.json 2>/dev/null || echo "0")
          echo "🪐 ──────────────────────────────────────────"
          echo "✅ Quantum Synthesis Complete"
          echo "📖 Total Codices in Data Vault: $TOTAL"
          echo "🗺️  Navigation Vectors Indexed: $SITEMAP_URLS"
          echo "📑 Index Matrix Size: ${CATALOG_SIZE} Bytes"
          echo "🪐 ──────────────────────────────────────────"

      # ── 11. Push Books + Catalog to pustakam-books ──────────────────────────
      - name: 📡 Transmitting Codices to Data Vault (pustakam-books)
        run: |
          cd pustakam-books-data
          git config user.name  "Pustakam Quantum Bot"
          git config user.email "quantum-bot@pustakam.app"
          git add .
          if git diff --staged --quiet; then
            echo "ℹ️ Zero state change detected — data vault fully updated"
          else
            BOOK_COUNT=$(git diff --staged --name-only | grep "books/" | wc -l)
            git commit -m "🌌 Quantum Codex Transmission: +${BOOK_COUNT} codices ($(date -u '+%Y-%m-%d'))"
            git push
            echo "✅ Successfully transmitted ${BOOK_COUNT} new codices to pustakam-books"
            echo "🚀 CDN: https://cdn.jsdelivr.net/gh/tanmay-kalbande/pustakam-books@main/books/"
          fi

      # ── 12. Purge jsDelivr CDN cache so new books appear immediately ────────
      - name: 🔄 Purging CDN Cache
        run: |
          echo "🔄 Purging jsDelivr cache for catalog..."
          curl -s "https://purge.jsdelivr.net/gh/tanmay-kalbande/pustakam-books@main/catalog.json" || true
          echo "✅ CDN cache purge requested"

      # ── 13. One-time Cleanup: Remove books from main repo after migration ────
      - name: 🧹 Cleaning Up Primary Vault (Removes Migrated Books)
        run: |
          MAIN_COUNT=$(find public/library/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          DATA_COUNT=$(find pustakam-books-data/books -name "*.json" 2>/dev/null | wc -l || echo "0")
          if [ "$MAIN_COUNT" -gt "0" ] && [ "$DATA_COUNT" -ge "$MAIN_COUNT" ]; then
            echo "🧹 Safe to remove — all $MAIN_COUNT books confirmed in pustakam-books"
            git rm -r --cached public/library/books/ --quiet 2>/dev/null || true
            rm -rf public/library/books/
            git rm --cached public/library/catalog.json --quiet 2>/dev/null || true
            rm -f public/library/catalog.json
            echo "✅ Primary vault cleaned — ~100MB freed from main repo"
          else
            echo "ℹ️ Cleanup skipped (main: $MAIN_COUNT books, data vault: $DATA_COUNT books)"
          fi

      # ── 14. Commit Sitemap + Checkpoint to Main Repo ────────────────────────
      - name: 📡 Syncing Checkpoint & Sitemap to Primary Vault
        run: |
          git config user.name  "Pustakam Quantum Bot"
          git config user.email "quantum-bot@pustakam.app"
          git add public/library/sitemap.xml scripts/.library-checkpoint.json
          git add -u
          if git diff --staged --quiet; then
            echo "ℹ️ No sitemap/checkpoint changes to commit"
          else
            git commit -m "🗺️ Sitemap & Checkpoint Update ($(date -u '+%Y-%m-%d'))"
            git push
            echo "✅ Primary vault synced"
          fi

      # ── 15. Emergency Signal on Disruptions ─────────────────────────────────
      - name: 🚨 Anomaly Diagnostics
        if: failure()
        run: |
          echo "⚠️ Transmission Interrupted: Diagnostics log captured in checkpoint memory"
          echo "🔁 Automatic orbital resume will ignite on next scheduled cycle"
